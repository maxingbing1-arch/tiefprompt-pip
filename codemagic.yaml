workflows:
  ios-sideload:
    name: Build signed IPA for sideloading
    instance_type: mac_mini_m2
    environment:
      flutter: beta
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "io.github.tiefseetauchner.tiefprompt"
        APP_NAME: "TiefPrompt"
        CERT_PASSWORD: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install --repo-update

      - name: Build Flutter iOS release
        script: |
          flutter build ios --release --no-codesign \
            --target lib/main_foss.dart

      - name: Sign with purchased certificate
        script: |
          # Paths
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          CERT_PATH="signing/cert.p12"
          PROFILE_PATH="signing/profile.mobileprovision"

          # 1. Create temporary keychain
          security create-keychain -p temp123 /tmp/build.keychain
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p temp123 /tmp/build.keychain

          # 2. Import certificate
          security import "${CERT_PATH}" \
            -k /tmp/build.keychain \
            -P "${CERT_PASSWORD}" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k temp123 /tmp/build.keychain

          # 3. Get signing identity
          IDENTITY=$(security find-identity -v -p codesign /tmp/build.keychain | grep -oE [^]+' | head -1 | tr -d ' || true)
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -v -p codesign /tmp/build.keychain | grep -oE [A-F0-9]{40} | head -1 || true)
          fi
          echo "Using identity: $IDENTITY"

          # 4. Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "${PROFILE_PATH}" ~/Library/MobileDevice/Provisioning\ Profiles/

          # 5. Copy profile into .app
          cp "${PROFILE_PATH}" "${APP_PATH}/embedded.mobileprovision"

          # 6. Extract entitlements from profile
          security cms -D -i "${PROFILE_PATH}" > /tmp/profile.plist
          plutil -extract Entitlements xml1 /tmp/profile.plist -o /tmp/entitlements.plist 2>/dev/null || true

          # 7. Sign frameworks
          codesign --force --sign "${IDENTITY}" \
            "${APP_PATH}/Frameworks/Flutter.framework" 2>/dev/null || true
          for fw in "${APP_PATH}/Frameworks/"*.framework; do
            [ -f "$fw" ] && codesign --force --sign "${IDENTITY}" "$fw" 2>/dev/null || true
          done

          # 8. Sign app
          if [ -f /tmp/entitlements.plist ]; then
            codesign --force --sign "${IDENTITY}" \
              --entitlements /tmp/entitlements.plist \
              "${APP_PATH}"
          else
            codesign --force --sign "${IDENTITY}" "${APP_PATH}"
          fi
          echo "Signing complete"

      - name: Package IPA
        script: |
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          mkdir -p build/ios/ipa/Payload
          cp -R "${APP_PATH}" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "${APP_NAME}.ipa" Payload/
          echo "IPA created at build/ios/ipa/${APP_NAME}.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - builder@example.com
        notify:
          success: false
          failure: true
